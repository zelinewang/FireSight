<!DOCTYPE html>
<html>
<head>
    <title>FireSight Data Fetch Test</title>
</head>
<body>
    <h1>FireSight Data Fetch Test</h1>
    <div id="status">Testing...</div>
    <div id="results"></div>
    
    <script>
        const NASA_FIRMS_ENDPOINTS = {
            modis: 'https://firms.modaps.eosdis.nasa.gov/data/active_fire/modis-c6.1/csv/MODIS_C6_1_Global_24h.csv',
            viirs: 'https://firms.modaps.eosdis.nasa.gov/data/active_fire/noaa-20-viirs-c2/csv/J1_VIIRS_C2_Global_24h.csv'
        };

        const DATA_ROUTES = [
            {
                name: 'Netlify same-origin proxy',
                resolve: endpoint => endpoint.replace(
                    'https://firms.modaps.eosdis.nasa.gov/data/active_fire/',
                    '/firms/'
                )
            },
            {
                name: 'AllOrigins public proxy',
                resolve: endpoint => `https://api.allorigins.win/raw?url=${encodeURIComponent(endpoint)}`
            },
            {
                name: 'Direct NASA',
                resolve: endpoint => endpoint
            }
        ];

        async function testFetch() {
            const status = document.getElementById('status');
            const results = document.getElementById('results');
            
            status.innerHTML = 'Testing data routes...';
            
            for (let i = 0; i < DATA_ROUTES.length; i++) {
                const route = DATA_ROUTES[i];
                const endpoint = NASA_FIRMS_ENDPOINTS.modis;
                const url = route.resolve(endpoint);
                
                try {
                    status.innerHTML = `Testing route ${i + 1}: ${route.name}`;
                    console.log(`Testing: ${url}`);
                    
                    const response = await fetch(url, {
                        headers: {
                            'Accept': 'text/csv,text/plain,*/*'
                        }
                    });
                    
                    console.log('Response status:', response.status);
                    console.log('Response headers:', response.headers);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const text = await response.text();
                    console.log('Response length:', text.length);
                    console.log('First 200 chars:', text.substring(0, 200));
                    
                    if (text.length > 100 && text.includes('latitude')) {
                        const lines = text.split('\n');
                        results.innerHTML = `
                            <h3>✅ Success with route ${i + 1}: ${route.name}</h3>
                            <p>Data length: ${text.length} characters</p>
                            <p>Number of lines: ${lines.length}</p>
                            <p>First few lines:</p>
                            <pre>${lines.slice(0, 5).join('\n')}</pre>
                        `;
                        status.innerHTML = 'Test completed successfully!';
                        return;
                    } else {
                        throw new Error('Invalid CSV data received');
                    }
                    
                } catch (error) {
                    console.error(`Route ${i + 1} failed:`, error);
                    results.innerHTML += `<p>❌ Route ${i + 1} failed: ${error.message}</p>`;
                }
            }
            
            status.innerHTML = '❌ All data routes failed!';
        }
        
        // Start test
        testFetch();
    </script>
</body>
</html>
