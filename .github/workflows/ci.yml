name: Validate static app

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check browser JavaScript syntax
        run: node --check src/app.js

      - name: Compile Python helpers
        run: python3 -m py_compile scripts/*.py
