# Netlify deployment configuration for FireSight
# Optimized for client-side wildfire data visualization

[build]
  publish = "src"
  command = "echo 'No build step required - static files ready!'"

# Keep browser requests same-origin on Netlify. The upstream paths are
# published by NASA FIRMS's official active-fire file catalog.
[[redirects]]
  from = "/firms/*"
  to = "https://firms.modaps.eosdis.nasa.gov/data/active_fire/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    
# Enable CORS for external API access
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
